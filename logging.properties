# TagWatcher Logging Configuration
# Managed via Admin > System Settings > Logging
# Restart not required — settings are applied immediately after saving.

# --- General ---
log.enabled=true
log.dir=logs

# --- Rotation ---
# strategy: size | date
#   size  → access.log.1, access.log.2, ... (numbered backup files)
#   date  → access.log.20260112             (date-suffixed backup files)
log.rotation.strategy=date
log.rotation.max_size_mb=10
log.rotation.backup_count=30
log.rotation.when=midnight
log.rotation.date_suffix=%Y%m%d

# --- Log Levels ---
# DEBUG | INFO | WARNING | ERROR
log.level.app=INFO
log.level.access=INFO
log.level.audit=INFO

# --- File Names ---
log.file.app=tagwatcher.log
log.file.access=access.log
log.file.audit=audit.log
