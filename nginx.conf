# =============================================================================
# TagWatcher — Nginx Reverse Proxy Configuration
# =============================================================================
#
# Features:
#   - Proxy to TagWatcher app (Gunicorn + Uvicorn workers)
#   - WebSocket upgrade support (for /containers/{id}/logs)
#   - X-Forwarded-* headers for BEHIND_PROXY=true mode
#   - Gzip compression
#   - Security headers
#   - SSL/TLS section (commented, enable for production)
#
# Usage:
#   docker compose up -d nginx
#
# For SSL with Let's Encrypt:
#   1. Obtain cert: certbot certonly --webroot -w /var/www/html -d tagwatcher.example.com
#   2. Uncomment the HTTPS server block below
#   3. Update domain name and cert paths
#   4. Redirect HTTP to HTTPS
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # Upstream — TagWatcher app
    upstream tagwatcher {
        server app:8000;
        keepalive 16;
    }

    # ─── HTTP Server ─────────────────────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name _;  # Replace _ with your domain name

        # Let's Encrypt ACME challenge (keep for cert renewal)
        location /.well-known/acme-challenge/ {
            root /var/www/html;
        }

        # Uncomment to redirect all HTTP traffic to HTTPS:
        # return 301 https://$host$request_uri;

        # Or keep HTTP enabled (not recommended for production):
        include /etc/nginx/conf.d/tagwatcher_proxy.conf*;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Auth rate limiting
        location /auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://tagwatcher;
            include /etc/nginx/snippets/proxy_params.conf*;
        }

        # WebSocket for live log streaming
        location ~ ^/containers/[^/]+/logs$ {
            proxy_pass http://tagwatcher;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Main proxy
        location / {
            proxy_pass http://tagwatcher;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header Connection "";
            proxy_buffering on;
            proxy_buffer_size 16k;
            proxy_buffers 8 16k;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            client_max_body_size 10m;
        }

        # Static files caching
        location /static/ {
            proxy_pass http://tagwatcher;
            proxy_cache_valid 200 1d;
            add_header Cache-Control "public, max-age=86400";
        }
    }

    # ─── HTTPS Server (uncomment and configure for production) ──────────────────
    #
    # server {
    #     listen 443 ssl http2;
    #     listen [::]:443 ssl http2;
    #     server_name tagwatcher.example.com;  # <-- your domain
    #
    #     # SSL certificate (Let's Encrypt or your own)
    #     ssl_certificate     /etc/nginx/ssl/cert.pem;
